on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: "https://mc-stan.org/r-packages/"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown
          needs: website

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}

      - name: Install CmdStan
        run: |
          if [ ! -d "$HOME/.cmdstan" ]; then
            Rscript -e "cmdstanr::install_cmdstan(cores = 2)"
          fi
        shell: bash

      - name: Install package
        run: Rscript -e "devtools::install(upgrade = FALSE, quiet = FALSE)"

      - name: Build site
        run: Rscript -e "pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)"

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
